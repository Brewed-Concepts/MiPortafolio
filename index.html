<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  >

  <meta
    name="apple-mobile-web-app-capable"
    content="yes"
  >

  <meta
    name="apple-mobile-web-app-title"
    content="Control de Gastos"
  >

  <meta
    name="apple-mobile-web-app-status-bar-style"
    content="black-translucent"
  >

  <meta name="theme-color" content="#101727">

  <link
    rel="apple-touch-icon"
    sizes="180x180"
    href="./icono-control-gastos.png?v=2"
  >

  <link
    rel="icon"
    type="image/png"
    href="./icono-control-gastos.png?v=2"
  >

  <title>Control de Gastos</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 24px;
      background:
        linear-gradient(
          145deg,
          #18233a,
          #080d17
        );
      color: white;
      font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        sans-serif;
      text-align: center;
    }

    .contenedor {
      width: min(360px, 100%);
    }

    .icono {
      width: 120px;
      height: 120px;
      margin-bottom: 22px;
      border-radius: 28px;
      box-shadow:
        0 18px 45px
        rgba(0, 0, 0, 0.35);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 30px;
    }

    p {
      margin: 0 0 26px;
      color: #b9c2d3;
      line-height: 1.5;
    }

    button {
      width: 100%;
      border: 0;
      border-radius: 14px;
      padding: 15px 20px;
      background: #3157d5;
      color: white;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <main class="contenedor">
    <img
      class="icono"
      src="./icono-control-gastos.png"
      alt="Control de Gastos"
    >

    <h1>Control de Gastos</h1>

    <p>
      Abriendo tu aplicación…
    </p>

    <button
      type="button"
      onclick="abrirAplicacion()"
    >
      Abrir aplicación
    </button>
  </main>

  <script>
    const URL_APLICACION =
      'PEGA_AQUI_LA_URL_DE_TU_APPS_SCRIPT';

    function abrirAplicacion() {
      window.location.href =
        URL_APLICACION;
    }

    const esInstalada =
      window.navigator.standalone === true ||
      window.matchMedia(
        '(display-mode: standalone)'
      ).matches;

    if (esInstalada) {
      setTimeout(
        abrirAplicacion,
        400
      );
    }
  </script>
</body>
</html>
